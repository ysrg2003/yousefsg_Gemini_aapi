name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    # سقف زمني قصير جداً لأننا نستهدف أقل من 30 ثانية
    timeout-minutes: 5 
    
    steps:
      - name: 🏁 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ الإقلاع الخارق (Extreme Speed Execution)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          # إعداد المسارات الأساسية في بيئة النظام
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          echo "📥 جاري سحب وفك الترسانة (Zstd Stream)..."
          # تحميل وفك الضغط في تدفق واحد (Piping) لتوفير وقت الكتابة على القرص
          gh release download v1.0.0 -p "vendor_assets.tar.zst" -O - | tar -I zstd -xf -
          
          echo "⚙️ إعداد البيئة الموازية..."
          # 1. إعداد PYTHONPATH ليشمل مجلد المكتبات الذي تم فكه
          export PYTHONPATH="${{ github.workspace }}/python:${PYTHONPATH}"
          
          # 2. إعداد الروابط التشعبية للمحرك (Symlink)
          mkdir -p /home/runner/.cache
          ln -sfn ${{ github.workspace }}/camoufox_cache /home/runner/.cache/camoufox
          
          # 3. منح صلاحيات التنفيذ لمتصفح Chromium بشكل مباشر
          chmod +x browsers/chromium_headless_shell-1208/chrome-headless-shell 2>/dev/null || true
          
          # 4. التأكد من وجود الملفات (اختياري للـ Debugging، يمكنك حذفه لاحقاً)
          echo "📂 الملفات الحالية في المجلد:"
          ls -F
          
          echo "🚀 انطلاق المحرك الرئيسي..."
          # تشغيل بايثون النظام مباشرة (أسرع من إعداد بيئة معزولة)
          python3 main.py "${{ github.event.inputs.prompt }}"

      - name: 📤 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
