name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    timeout-minutes: 5 
    
    steps:
      - name: 🏁 Checkout Code
        uses: actions/checkout@v4

      - name: ⚡ الإقلاع الخارق (Extreme Speed Execution)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          # إعداد المسارات الأساسية
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          echo "📥 جاري سحب وفك الترسانة (Zstd Stream)..."
          # تحميل وفك الضغط
          gh release download v1.0.0 -p "vendor_assets.tar.zst" -O - | tar -I zstd -xf -
          
          echo "⚙️ إعداد البيئة الموازية..."
          # 🚀 الإصلاح الجوهري: توجيه بايثون للمكان الصحيح للمكتبات
          # بما أن المجلدات موجودة داخل python/ فنحن نحتاج هذا المسار تحديداً
          export PYTHONPATH="${{ github.workspace }}/python"
          
          # إعداد الروابط التشعبية للمحرك
          mkdir -p /home/runner/.cache
          ln -sfn ${{ github.workspace }}/camoufox_cache /home/runner/.cache/camoufox
          
          # منح صلاحيات التنفيذ للمتصفح
          chmod +x browsers/chromium_headless_shell-1208/chrome-headless-shell 2>/dev/null || true
          
          echo "🚀 انطلاق المحرك الرئيسي..."
          # استخدام python3 النظام مباشرة
          python3 main.py "${{ github.event.inputs.prompt }}"

      - name: 📤 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
