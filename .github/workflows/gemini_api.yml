name: Gemini High Speed API

on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Download Engine Assets
        run: |
          echo "📥 جاري سحب الترسانة v1.0.0..."
          gh release download v1.0.0 -p "vendor_assets.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗜️ Smart Unzip & Injection
        run: |
          echo "🔓 فك الضغط الذكي..."
          mkdir -p assets_extracted
          unzip -qo vendor_assets.zip -d assets_extracted
          
          # مسارات النظام التي يجب أن نحقن فيها الملفات
          mkdir -p /home/runner/.cache/camoufox
          mkdir -p /home/runner/.cache/ms-playwright

          # --- البحث المرن ونقل الملفات ---
          # نبحث عن مجلد الكاش أينما كان (حتى لو كان اسمه camoufox_cache أو cache)
          find assets_extracted -type d -name "*cache*" -not -path "*python*" | while read dir; do
            echo "📦 حقن الكاش من: $dir"
            cp -rn "$dir"/* /home/runner/.cache/camoufox/ 2>/dev/null || true
          done

          # نبحث عن مجلد المتصفحات (browsers)
          find assets_extracted -type d -name "browsers" | while read dir; do
            echo "🌐 حقن المتصفحات من: $dir"
            cp -rn "$dir"/* /home/runner/.cache/ms-playwright/ 2>/dev/null || true
          done

          # نبحث عن مجلد المكتبات (python) لإضافته لـ PYTHONPATH لاحقاً
          PYTHON_LIB_PATH=$(find $(pwd)/assets_extracted -type d -name "python" | head -n 1)
          echo "PYTHON_PATH_VAR=$PYTHON_LIB_PATH" >> $GITHUB_ENV
          
          echo "✅ تم تجهيز البيئة بنجاح."

      - name: 🛡️ Fix Permissions
        run: |
          echo "🔑 تفعيل صلاحيات التنفيذ..."
          chmod -R +x /home/runner/.cache/camoufox/ 2>/dev/null || true
          chmod -R +x /home/runner/.cache/ms-playwright/ 2>/dev/null || true

      - name: ⚡ Execute Gemini Automation
        env:
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          PYTHONPATH: ${{ env.PYTHON_PATH_VAR }}
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          echo "🚀 تشغيل المحرك الأساسي من المسار: $PYTHONPATH"
          python main.py "${{ github.event.inputs.prompt }}"

      - name: 📄 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
          retention-days: 1
