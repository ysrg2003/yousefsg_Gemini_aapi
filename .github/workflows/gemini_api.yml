name: Gemini Fast API (No Download)
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gemini
        env:
          PYTHONPATH: ${{ github.workspace }}/vendor/python
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/vendor/browsers
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
        run: |
          # هنا نستخدم بايثون مباشرة مع المجلد المرفوع
          python3 main.py "${{ github.event.inputs.prompt }}"

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
