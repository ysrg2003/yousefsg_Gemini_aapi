name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    # نحدد مهلة زمنية قصيرة جداً لأننا نتوقع أداءً خارقاً
    timeout-minutes: 5 
    
    steps:
      - name: 🏁 Checkout
        uses: actions/checkout@v4

      - name: ⚡ الإقلاع الخارق (التحميل والفك والتشغيل المتوازي)
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          # إعداد المسارات فوراً في البيئة
          PYTHONPATH: ${{ github.workspace }}/python
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          # 1. تحميل الترسانة وفك ضغطها في تدفق واحد (Piping)
          # نستخدم غلاف (subshell) للتحميل والفك مباشرة لتوفير وقت الكتابة على القرص
          echo "📥 جاري سحب وفك الترسانة في الذاكرة..."
          gh release download v1.0.0 -p "vendor_assets.tar.zst" -O - | tar -I zstd -xf -
          
          # 2. إعداد الروابط التشعبية للمحرك في لمح البصر
          mkdir -p /home/runner/.cache
          ln -sfn ${{ github.workspace }}/camoufox_cache /home/runner/.cache/camoufox
          
          # 3. منح صلاحيات التنفيذ للمتصفح بشكل سريع ومستهدف
          chmod +x browsers/chromium_headless_shell-1208/chrome-headless-shell 2>/dev/null || true
          
          echo "🚀 انطلاق المحرك..."
          # 4. تشغيل بايثون النظام مباشرة (يوفر 8-12 ثانية من وقت Setup-Python)
          python3 main.py "${{ github.event.inputs.prompt }}"

      - name: 📤 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
