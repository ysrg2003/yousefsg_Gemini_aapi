name: 🚀 Build Permanent Vendor Assets
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # للسماح للأكشن بالرفع للمستودع
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Everything
        run: python setup_assets.py

# ... (نفس البداية)
      - name: Commit and Push Assets
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add vendor_assets.zip
          git commit -m "Add permanent compressed assets"
          git push

