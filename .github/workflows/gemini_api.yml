name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # تم حذف خطوة setup-python لتوفير 11 ثانية، سنستخدم python3 الافتراضي
      
      - name: 📥 Download & Inject Assets
        run: |
          echo "📥 سحب ملفات المحرك من الـ Release..."
          gh release download v1.0.0 -p "vendor_assets.zip"
          unzip -qo vendor_assets.zip
          chmod -R +x camoufox_cache/ 2>/dev/null || true
          chmod -R +x browsers/ 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run
        env:
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          PYTHONPATH: ${{ github.workspace }}/python
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
          # 🚀 إضافة مسار الكاش لمنع التحميل من الصفر!
          CAMOUFOX_CACHE_DIR: ${{ github.workspace }}/camoufox_cache 
        run: |
          echo "🚀 تشغيل الأتمتة..."
          # استخدام python3 الافتراضي في بيئة أوبونتو
          python3 main.py "${{ github.event.inputs.prompt }}"

      - name: Result
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
