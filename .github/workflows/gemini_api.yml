name: Gemini High Speed API

on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      actions: write

    steps:
      - name: 📂 Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Download Engine Assets
        run: |
          echo "📥 جاري سحب الترسانة v1.0.0..."
          gh release download v1.0.0 -p "vendor_assets.zip"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🗜️ Fast Unzip & Injection
        run: |
          echo "🔓 فك الضغط والحقن الذكي..."
          # فك الضغط إلى مجلد موحد
          mkdir -p assets_extracted
          unzip -qn vendor_assets.zip -d assets_extracted
          
          # إنشاء مسارات النظام الافتراضية
          mkdir -p /home/runner/.cache/camoufox
          mkdir -p /home/runner/.cache/ms-playwright
          
          # نقل ملفات المحرك (Camoufox) لمسار النظام لخدعة المكتبة ومنع التحميل
          if [ -d "assets_extracted/camoufox_cache" ]; then
            cp -rn assets_extracted/camoufox_cache/* /home/runner/.cache/camoufox/ 2>/dev/null || true
          fi

          # نقل محركات المتصفح (Playwright) إن وجدت
          if [ -d "assets_extracted/browsers" ]; then
            cp -rn assets_extracted/browsers/* /home/runner/.cache/ms-playwright/ 2>/dev/null || true
          fi
          
          echo "✅ تم حقن المحركات في مسار النظام بنجاح."

      - name: 🛡️ Fix Permissions
        run: |
          echo "🔑 تفعيل صلاحيات التنفيذ..."
          chmod -R +x /home/runner/.cache/camoufox/ 2>/dev/null || true
          chmod -R +x /home/runner/.cache/ms-playwright/ 2>/dev/null || true

      - name: ⚡ Execute Gemini Automation
        env:
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          # إضافة مسار المكتبات المستخرجة إلى مسار بايثون
          PYTHONPATH: ${{ github.workspace }}/assets_extracted/python
        run: |
          echo "🚀 تشغيل المحرك الأساسي..."
          python main.py "${{ github.event.inputs.prompt }}"

      - name: 📄 Upload Result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
          retention-days: 1
