name: Gemini Simple API
on:
  workflow_dispatch:
    inputs:
      prompt:
        required: true
        type: string

jobs:
  run-system:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # ⚠️ أعدنا هذه الخطوة لأن المكتبات تم بناؤها خصيصاً للإصدار 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📥 Download & Inject Assets
        run: |
          echo "📥 سحب ملفات المحرك من الـ Release..."
          gh release download v1.0.0 -p "vendor_assets.zip"
          unzip -qo vendor_assets.zip
          
          # 🚀 الخدعة الكبرى: نقل الكاش إلى المسار الذي يريده المحرك إجبارياً
          mkdir -p /home/runner/.cache
          mv camoufox_cache /home/runner/.cache/camoufox
          
          # تفعيل الصلاحيات
          chmod -R +x /home/runner/.cache/camoufox 2>/dev/null || true
          chmod -R +x browsers/ 2>/dev/null || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run
        env:
          GEMINI_COOKIES: ${{ secrets.GEMINI_COOKIES }}
          PYTHONPATH: ${{ github.workspace }}/python
          PLAYWRIGHT_BROWSERS_PATH: ${{ github.workspace }}/browsers
          # نبقي هذا للاحتياط
          CAMOUFOX_CACHE_DIR: /home/runner/.cache/camoufox
        run: |
          echo "🚀 تشغيل الأتمتة..."
          python main.py "${{ github.event.inputs.prompt }}"


      - name: Result
        uses: actions/upload-artifact@v4
        with:
          name: gemini-json
          path: result.json
